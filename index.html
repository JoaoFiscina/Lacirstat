<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bioestatística LACIR</title>
  <link rel="stylesheet" href="./assets/css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <h1>Bioestatística LACIR</h1>
        <p>Calculadora modular de testes estatísticos</p>
      </div>

      <nav id="test-nav" class="test-nav">
        <div class="loading">Carregando testes...</div>
      </nav>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <h2 id="page-title">Selecione um teste</h2>
        <p id="page-subtitle">Escolha uma opção no menu lateral.</p>
      </header>

      <section id="module-root" class="module-root">
        <div class="empty-state">
          <h3>Bem-vindo</h3>
          <p>Selecione um teste no menu para começar.</p>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
